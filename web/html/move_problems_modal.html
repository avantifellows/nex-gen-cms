<div id="move-problems-modal" data-problem-ids='{{.}}'
    class="fixed inset-0 bg-ink/40 flex justify-center items-center z-50 p-4">
    <div class="card shadow-xl rounded-xl p-6 w-full max-w-3xl max-h-[90vh] overflow-y-auto">

        <h2 class="page-title mb-2">Move Problems</h2>
        <p class="text-sm text-ink-muted mb-6">
            Select Curriculum, Grade & Subject in any order. Then select Chapter, and finally Topic.
        </p>

        <form id="move-problems-form" class="space-y-6" hx-post="/move-problems" hx-swap="none"
            hx-vals='js:{problem_ids: document.getElementById("move-problems-modal").dataset.problemIds}'
            hx-on::after-request="handleMoveProblemsResponse(event)"
            hx-disabled-elt="#move-problems-modal button">

            <div class="grid grid-cols-3 gap-4">

                <!-- Curriculum -->
                <select id="curriculum-dropdown" name="curriculum-dropdown" 
                        class="form-select" hx-get="/api/curriculums"
                        hx-trigger="load" hx-target="this" hx-swap="innerHTML"
                        hx-on::after-request="afterMoveProblemsDropdownReq(this)">
                    <option disabled selected>Loading curriculums...</option>
                </select>

                <!-- Grade -->
                <select id="grade-dropdown" name="grade-dropdown" 
                        class="form-select" hx-get="/api/grades"
                        hx-trigger="load" hx-target="this" hx-swap="innerHTML"
                        hx-on::after-request="afterMoveProblemsDropdownReq(this)">
                    <option disabled selected>Loading grades...</option>
                </select>

                <!-- Subject -->
                <select id="subject-dropdown" name="subject-dropdown" 
                        class="form-select" hx-get="/api/subjects"
                        hx-trigger="load" hx-target="this" hx-swap="innerHTML"
                        hx-on::after-request="afterMoveProblemsDropdownReq(this)">
                    <option disabled selected>Loading subjects...</option>
                </select>

                <!-- Chapter -->
                <select id="chapter-dropdown" name="chapter-dropdown" 
                        class="form-select" hx-get="/api/chapters"
                        hx-target="this" hx-swap="innerHTML"
                        hx-trigger="loadChapters, change from:(#move-problems-modal #curriculum-dropdown, #move-problems-modal #grade-dropdown, #move-problems-modal #subject-dropdown)"
                        hx-include="#move-problems-modal #curriculum-dropdown, #move-problems-modal #grade-dropdown, #move-problems-modal #subject-dropdown"
                        hx-params="not chapter-dropdown" hx-on::before-request="beforeMoveProblemsChaptersRequest()"
                        hx-on::after-request="toggleMoveButton()">
                    <option disabled selected>Loading chapters...</option>
                </select>

                <!-- Topic -->
                <select id="topic-dropdown" name="topic_id" class="form-select"
                        hx-get="/api/topics?view=dropdown" hx-trigger="change from:#chapter-dropdown"
                        hx-target="this" hx-swap="innerHTML" onchange="toggleMoveButton()" 
                        hx-include="#chapter-dropdown, #move-problems-modal #curriculum-dropdown" hx-on::after-swap="toggleMoveButton()"
                        hx-on::before-request="beforeMoveProblemsTopicsRequest()"
                        hx-on::after-request="toggleMoveButton()">
                    <option value="" disabled selected>Select a chapter first</option>
                </select>

            </div>

            <!-- Buttons -->
            <div class="flex justify-end gap-3 pt-4 border-t border-border">
                <button type="button" onclick="closeMoveProblemsModal()" class="btn-secondary">
                    Cancel
                </button>

                <button id="move-problems-btn" type="submit" disabled
                    class="btn-primary disabled:opacity-50 disabled:cursor-not-allowed disabled:bg-bg-card-alt disabled:text-ink-muted">
                    <!-- Normal text -->
                    <span class="btn-text">Move</span>
                    <!-- Loader -->
                    <span class="btn-loader hidden">Moving…</span>
                </button>
            </div>

        </form>
    </div>
</div>
<script>
function afterMoveProblemsDropdownReq(dropdown) {
    dropdown.dataset.loaded = "true";

    const modal = document.getElementById("move-problems-modal");

    const allReady =
        modal.querySelector("#curriculum-dropdown").dataset.loaded &&
        modal.querySelector("#grade-dropdown").dataset.loaded &&
        modal.querySelector("#subject-dropdown").dataset.loaded;

    if (allReady) {
        htmx.trigger(modal.querySelector("#chapter-dropdown"), "loadChapters");
    }
}

function beforeMoveProblemsChaptersRequest() {
    const modal = document.getElementById("move-problems-modal");
    const chapter = modal.querySelector("#chapter-dropdown");
    chapter.innerHTML = '<option disabled selected>Loading chapters...</option>';

    const topic = modal.querySelector("#topic-dropdown");
    topic.innerHTML = '<option value="" disabled selected>Select a chapter first</option>';

    modal.querySelector("#move-problems-btn").disabled = true;
}

function beforeMoveProblemsTopicsRequest() {
    const modal = document.getElementById("move-problems-modal");
    const topic = modal.querySelector("#topic-dropdown");
    topic.innerHTML = '<option disabled selected>Loading topics...</option>';
}

function toggleMoveButton() {
    const modal = document.getElementById("move-problems-modal");
    const topic = modal.querySelector("#topic-dropdown");
    const moveBtn = modal.querySelector("#move-problems-btn");
    moveBtn.disabled = !topic.value;
}

function handleMoveProblemsResponse(event) {
    const { xhr, requestConfig } = event.detail;

    // path comparison is required here, because otherwise it is called for all calls 
    // from form's children as well
    if (requestConfig.path !== "/move-problems") return;

    if (xhr.status === 200) {
        closeMoveProblemsModal();
        // refresh only problems table
        htmx.trigger("#problemTableBody", "refreshProblems");

    } else {
        showToast(xhr.responseText || "Failed to move problems");
    }
}

function closeMoveProblemsModal() {
    document.getElementById("move-problems-modal").remove();
}
</script>
