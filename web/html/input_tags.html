{{ define "input_tags" }}
<div class="problem-tags-section" data-initial-tags='{{ toJson . }}'>
    <div class="relative">
        <div class="tags-input-shell flex flex-wrap items-center w-full border p-2 gap-2 cursor-text">
            <input type="text" class="tag-text-input flex-1 min-w-[100px] border-none outline-hidden p-1"
                placeholder="Assign tags" hx-get="/api/tags" hx-swap="innerHTML"
                hx-trigger="input changed delay:300ms" hx-ext="tagInputExtension" />
        </div>
        <div class="tag-autocomplete-dropdown hidden absolute top-full left-0 right-0 bg-bg-card border border-border border-t-0 rounded-b-md shadow-lg max-h-40 overflow-y-auto z-10"></div>
    </div>
</div>
<script>
(function () {
    // One WeakMap for the SPA session: htmx's tagInputExtension is registered once, but this
    // partial's script can run again on navigation—new DOM roots must register on the same map.
    // Keys are DOM nodes; when a node is removed and GC'd, its WeakMap entry disappears (no manual delete).
    if (!window.__problemTagSectionState) {
        window.__problemTagSectionState = new WeakMap();
    }
    const tagSectionState = window.__problemTagSectionState;

    function trimTagValue(raw) {
        return (raw ?? '').toString().trim();
    }

    function ensureTagsAutocompleteDocClick() {
        if (window.__tagsAutocompleteDocClick) return;
        window.__tagsAutocompleteDocClick = true;
        document.addEventListener('click', (e) => {
            document.querySelectorAll('.problem-tags-section').forEach(root => {
                const st = tagSectionState.get(root);
                if (!st) return;
                if (!st.container.contains(e.target) && !st.autocompleteDiv.contains(e.target)) {
                    st.autocompleteDiv.classList.add('hidden');
                }
            });
        });
    }

    if (!window.initProblemTagsSection) {
        window.initProblemTagsSection = function (root) {
            if (!root || tagSectionState.has(root)) return;

            let initial = [];
            try {
                initial = JSON.parse(root.dataset.initialTags || '[]') || [];
            } catch (_) {
                initial = [];
            }
            if (!Array.isArray(initial)) initial = [];
            const tags = initial.map(trimTagValue).filter(Boolean);

            const container = root.querySelector('.tags-input-shell');
            const input = root.querySelector('.tag-text-input');
            const autocompleteDiv = root.querySelector('.tag-autocomplete-dropdown');
            if (!container || !input || !autocompleteDiv) return;

            const seq = (window.__tagAcSeq = (window.__tagAcSeq || 0) + 1);
            const acId = 'tag-ac-' + seq;
            autocompleteDiv.id = acId;
            input.setAttribute('hx-target', '#' + acId);

            const state = { tags, container, input, autocompleteDiv, root };
            tagSectionState.set(root, state);

            function hideSuggestions() {
                autocompleteDiv.classList.add('hidden');
            }

            function renderTags() {
                container.querySelectorAll('.chip').forEach(chip => chip.remove());
                state.tags.forEach(tag => {
                    const chip = document.createElement('span');
                    chip.className = 'chip bg-brand-blue-bg text-accent-hover text-sm px-2 py-1 rounded-full flex items-center gap-1';
                    chip.innerHTML = `
                        ${tag}
                        <button type="button" class="ml-1 text-accent-hover hover:text-accent-hover font-bold">&times;</button>
                    `;
                    chip.querySelector('button').addEventListener('click', () => {
                        state.tags = state.tags.filter(t => t !== tag);
                        renderTags();
                    });
                    container.insertBefore(chip, input);
                });
            }

            function addTag(tag) {
                hideSuggestions();
                const t = trimTagValue(tag);
                if (t && !state.tags.includes(t)) {
                    state.tags.push(t);
                    renderTags();
                }
                input.value = '';
            }

            state.addTag = addTag;

            ensureTagsAutocompleteDocClick();
            container.addEventListener('click', () => input.focus());

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ',') {
                    e.preventDefault();
                    addTag(input.value);
                } else if (e.key === 'Backspace' && input.value === '') {
                    state.tags.pop();
                    renderTags();
                    hideSuggestions();
                } else if (e.key === 'Escape') {
                    hideSuggestions();
                }
            });

            renderTags();

            if (window.htmx) {
                htmx.process(root);
            }
        };
    }

    if (!window.getTagsForSection) {
        window.getTagsForSection = function (root) {
            const st = root && tagSectionState.get(root);
            return st ? [...st.tags] : [];
        };
    }

    window.addTagFromAutocomplete = function (rowEl) {
        const tag = rowEl.getAttribute('data-tag-name');
        const dropdown = rowEl.closest('.tag-autocomplete-dropdown');
        const sectionRoot = dropdown && dropdown.closest('.problem-tags-section');
        const st = sectionRoot && tagSectionState.get(sectionRoot);
        if (!st || !st.addTag) return;
        st.addTag(tag);
    };

    if (window.htmx && !window.__tagInputExtensionDefined) {
        window.__tagInputExtensionDefined = true;
        htmx.defineExtension('tagInputExtension', {
            onEvent: function (name, evt) {
                if (name !== 'htmx:configRequest') return;
                const inputEl = evt.detail.elt;
                const root = inputEl.closest('.problem-tags-section');
                const st = root && tagSectionState.get(root);
                if (!st) return;
                const query = inputEl.value;
                if (query.length < 3) {
                    evt.preventDefault();
                    st.autocompleteDiv.innerHTML = '';
                    st.autocompleteDiv.classList.add('hidden');
                    return;
                }
                const url = new URL(evt.detail.path, window.location.origin);
                url.searchParams.set('q', query);
                st.tags.forEach(tag => {
                    url.searchParams.append('selected', tag);
                });
                evt.detail.path = url.pathname + url.search;
                st.autocompleteDiv.classList.remove('hidden');
            }
        });
    }
})();
</script>
{{ end }}
