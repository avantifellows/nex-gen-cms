{{ define "test_instructions_modal" }}
<div id="test-instructions-modal"
    class="hidden fixed inset-0 z-50 flex items-center justify-center bg-ink/40 p-4"
    onclick="if (event.target === this) closeInstructionsModal()">
    <div class="card shadow-xl rounded-xl w-full max-w-5xl p-6 max-h-[90vh] flex flex-col">
        <div class="flex items-center justify-between border-b border-border pb-3 mb-3">
            <h2 class="page-title">Test Instructions</h2>
            <button type="button" class="action-button p-2" aria-label="Close"
                onclick="closeInstructionsModal()">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <div id="test-instructions-editor-wrapper" class="flex-1 overflow-y-auto">
            {{ template "editor" }}
        </div>

        <div class="mt-4 flex justify-end gap-3">
            <button type="button" class="btn-secondary"
                onclick="closeInstructionsModal()">
                Cancel
            </button>
            <button type="button" class="btn-primary"
                onclick="saveInstructionsModal()">
                Save Instructions
            </button>
        </div>
    </div>
</div>
<script src="/web/static/js/editor.js"></script>
<script>
    function getCurrentInstructions() {
        const hiddenInput = document.getElementById("test-instructions");
        return hiddenInput?.value || "";
    }

    function getInstructionsEditor() {
        const wrapper = document.getElementById("test-instructions-editor-wrapper");
        return wrapper?.querySelector(".editor");
    }

    function openInstructionsModal() {
        const modal = document.getElementById("test-instructions-modal");
        const editor = getInstructionsEditor();
        const initialInstructions = getCurrentInstructions() || "";

        if (editor) {
            editor.innerHTML = initialInstructions;
            if (typeof renderMath === "function") {
                renderMath(editor);
            }
            editor.focus();
        }

        modal.classList.remove("hidden");
    }

    function closeInstructionsModal() {
        const modal = document.getElementById("test-instructions-modal");
        modal.classList.add("hidden");
    }

    function saveInstructionsModal() {
        const hiddenInput = document.getElementById("test-instructions");
        const editor = getInstructionsEditor();
        hiddenInput.value = editor ? editor.innerHTML.trim() : "";
        closeInstructionsModal();
    }
</script>
{{ end }}
