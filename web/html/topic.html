{{ define "content" }}
<div id="topic-div" class="card card-pad mb-4">
    <div class="flex items-center mb-4">
        <button class="btn-ghost btn-sm" onclick="window.history.back()">
            <i class="fa-solid fa-chevron-left"></i> Back
        </button>
        <h3 class="ml-4 text-lg font-bold uppercase tracking-wide text-ink">{{ getName .TopicPtr "en" }}</h3>
    </div>
    <div class="flex flex-wrap gap-3 py-2 border-b border-border">
        <button id="topic-concepts-tab" data-toggle="sub-tab" class="sub-tab active" onclick="onTopicTabClick(this)"
            hx-trigger="click, load" hx-get="/concepts" hx-target="#subContent">Concepts</button>
        <button id="topic-problems-tab" data-toggle="sub-tab" class="sub-tab" onclick="onTopicTabClick(this)"
            hx-get="/topic/problems?topic_id={{.TopicPtr.ID}}" hx-target="#subContent">Problems</button>
        <button id="resources-tab" data-toggle="sub-tab" class="sub-tab" onclick="onTopicTabClick(this)"
            hx-get="/topic/resources?topicId={{.TopicPtr.ID}}&chapterId={{.TopicPtr.ChapterID}}" hx-target="#subContent">Resources</button>
    </div>
    <div id="sub-tabContent" class="pt-4">
        <div id="subContent">
            <p class="text-ink-muted">Select a tab to load content.</p>
        </div>
    </div>
</div>
<script>
    var SESSION_KEY_TOPIC_TAB = "selectedTopicTab";

    (function () {
        if (window.lastPushedScreen === PUSHED_SCREEN_TOPIC) {
            // clear session storage values stored earlier as this is new screen opened
            sessionStorage.removeItem(SESSION_KEY_TOPIC_TAB);
        }
    })();

    function onTopicTabClick(subtabBtn, event) {
        const subtabBtns = document.querySelectorAll('[data-toggle="sub-tab"]');
        subtabBtns.forEach(btn => btn.classList.remove("active"));
        subtabBtn.classList.add("active");
        sessionStorage.setItem(SESSION_KEY_TOPIC_TAB, subtabBtn.id);
    }

    document.querySelector(TOPIC_DIV_SELECTOR).addEventListener(BACK_TO_TOPIC_EVT, () => {
        // Using default 1st tab having id "topic-concepts-tab"
        let selectedTab = sessionStorage.getItem(SESSION_KEY_TOPIC_TAB) || "topic-concepts-tab";
        const tabButton = document.getElementById(selectedTab);
        if (tabButton) {
            tabButton.click();
        }
    });
</script>
{{ end }}
